<style>
/* ── iOS SYSTEM TOKENS ── */
:root {
  /* ── Cinema backgrounds (warm cream, like ticket paper) ── */
  --sys-bg:          #F5F0E8;
  --sys-bg2:         #FDFAF5;
  --sys-bg3:         #EDE8DE;
  --sys-grouped:     #E8E2D8;
  --sys-elevated:    #FDFAF5;

  /* ── Cinema palette ── */
  /* Popcorn red — muted, warm */
  --cin-red:         #B54040;
  --cin-red-bg:      #F8ECEC;
  --cin-red-tint:    rgba(181,64,64,0.10);

  /* Butter gold — popcorn/projector beam */
  --cin-gold:        #C08A30;
  --cin-gold-bg:     #FBF3E3;
  --cin-gold-tint:   rgba(192,138,48,0.12);

  /* Sage green — cinema EXIT sign */
  --cin-green:       #4A8A60;
  --cin-green-bg:    #EBF5EF;
  --cin-green-tint:  rgba(74,138,96,0.12);

  /* Amber — film reel/projector warm light */
  --cin-amber:       #C07030;
  --cin-amber-bg:    #FAF0E6;

  /* Dusty rose — vintage movie poster */
  --cin-rose:        #A85060;
  --cin-rose-bg:     #F8ECEE;
  --cin-rose-tint:   rgba(168,80,96,0.10);

  /* Slate purple — film noir shadow */
  --cin-purple:      #7060A0;
  --cin-purple-bg:   #F0EBF8;

  /* Sepia indigo — old reel */
  --cin-indigo:      #506090;
  --cin-indigo-bg:   #EBF0F8;

  /* Clapperboard dark */
  --cin-dark:        #2A2018;
  --cin-dark-bg:     #E8E2D8;

  /* Accent = popcorn red */
  --acc:             #B54040;
  --acc-dark:        #8A2A2A;

  /* ── Text (warm, not cold iOS grey) ── */
  --label:           #1E1810;
  --label2:          #3D3028;
  --label3:          rgba(61,48,40,0.55);
  --label4:          rgba(61,48,40,0.28);
  --placeholder:     rgba(61,48,40,0.30);

  /* ── Fills (warm toned) ── */
  --fill1:           rgba(90,70,50,0.18);
  --fill2:           rgba(90,70,50,0.10);
  --fill3:           rgba(90,70,50,0.05);

  /* ── Separators ── */
  --sep:             rgba(61,48,40,0.10);
  --sep-opaque:      #C8BFB0;

  /* ── Radii ── */
  --r-sm:    10px;
  --r-md:    13px;
  --r-lg:    16px;
  --r-xl:    22px;
  --r-pill:  100px;

  /* ── Shadows (warm toned) ── */
  --sh-sm:   0 1px 3px rgba(30,24,16,0.08), 0 1px 2px rgba(30,24,16,0.04);
  --sh-md:   0 4px 16px rgba(30,24,16,0.09), 0 1px 4px rgba(30,24,16,0.05);
  --sh-lg:   0 12px 40px rgba(30,24,16,0.12), 0 4px 12px rgba(30,24,16,0.06);
  --sh-panel:0 -2px 30px rgba(30,24,16,0.10), 0 0 0 0.5px rgba(30,24,16,0.06);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--sys-bg);
  color: var(--label);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  background-image: radial-gradient(ellipse at 20% 0%, rgba(181,64,64,0.05) 0%, transparent 60%), radial-gradient(ellipse at 80% 100%, rgba(192,138,48,0.05) 0%, transparent 60%);
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--cin-red); opacity:0.4; border-radius: 10px; }

/* ── LAYOUT ── */
#app { display: flex; min-height: 100vh; }

/* ── SIDEBAR ── */
#sidebar {
  width: 260px;
  min-width: 260px;
  background: rgba(242,235,224,0.95);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-right: 0.5px solid var(--sep-opaque);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  flex-shrink: 0;
  z-index: 100;
}

/* ── MAIN ── */
#main {
  flex: 1;
  min-width: 0;
}

.logo {
  padding: 24px 20px 16px;
  border-bottom: 0.5px solid var(--sep);
}
.logo-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--cin-red);
  letter-spacing: -0.5px;
}
.logo-sub {
  font-size: 11px;
  color: var(--label3);
  font-weight: 500;
  margin-top: 2px;
  letter-spacing: 0.2px;
}

nav { padding: 8px 0 12px; flex: 1; }

.nav-sec {
  padding: 18px 20px 6px;
  font-size: 11px;
  font-weight: 700;
  color: var(--label3);
  letter-spacing: 0.8px;
  text-transform: uppercase;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 9px 16px;
  margin: 1px 10px;
  cursor: pointer;
  color: var(--label2);
  font-size: 14px;
  font-weight: 600;
  transition: background 0.15s, color 0.15s;
  border-radius: var(--r-md);
  letter-spacing: -0.1px;
}
.nav-item:hover { background: var(--fill2); }
.nav-item.active {
  background: var(--cin-red);
  color: #fff;
  font-weight: 700;
  box-shadow: var(--sh-sm);
}
.nav-item .ico {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  background: var(--fill2);
  flex-shrink: 0;
  transition: background 0.15s;
}
.nav-item.active .ico {
  background: rgba(255,255,255,0.25);
}
/* Nav section icon colors */
.nav-item:nth-of-type(1) .ico { background:var(--cin-red-tint); color:var(--cin-red); }
.nav-item:nth-of-type(2) .ico { background:var(--cin-green-tint); color:var(--cin-green); }
.nav-item:nth-of-type(3) .ico { background:var(--cin-gold-bg); color:var(--cin-gold); }
.nav-item:nth-of-type(4) .ico { background:var(--cin-amber-bg); color:var(--cin-amber); }
.nav-item:nth-of-type(5) .ico { background:var(--cin-rose-bg); color:var(--cin-rose); }
.nav-item:nth-of-type(6) .ico { background:var(--cin-purple-bg); color:var(--cin-purple); }

.nav-badge {
  margin-left: auto;
  background: var(--cin-red-tint);
  color: var(--cin-red);
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: var(--r-pill);
  min-width: 22px;
  text-align: center;
}
.nav-item.active .nav-badge {
  background: rgba(255,255,255,0.25);
  color: #fff;
}

.sidebar-foot {
  padding: 12px 16px 16px;
  border-top: 0.5px solid var(--sep);
}
.stat-mini { display: flex; flex-direction: column; gap: 5px; }
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--label3);
  font-weight: 500;
  padding: 4px 0;
}
.stat-row b {
  background: var(--cin-red-tint);
  color: var(--cin-red);
  padding: 1px 8px;
  border-radius: var(--r-pill);
  font-size: 11px;
  font-weight: 700;
}

/* ── MAIN ── */
#main { flex: 1; min-width: 0; }

/* ── TOPBAR ── */
.topbar {
  background: rgba(245,240,232,0.88);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 0.5px solid var(--sep-opaque);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 50;
  min-height: 52px;
}
.topbar-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--label);
  flex: 1;
  letter-spacing: -0.2px;
}
.topbar-title span { color: var(--cin-red); }

/* ── SEARCH BAR (iOS style) ── */
.search-wrap {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--fill2);
  border: none;
  border-radius: var(--r-md);
  padding: 7px 12px;
  min-width: 180px;
  transition: background 0.15s;
}
.search-wrap:focus-within { background: var(--fill1); }
.search-wrap input {
  background: none;
  border: none;
  outline: none;
  color: var(--label);
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  width: 100%;
}
.search-wrap input::placeholder { color: var(--placeholder); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--r-pill);
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  letter-spacing: -0.1px;
}
.btn:active { transform: scale(0.96); opacity: 0.85; }
.btn-primary {
  background: var(--cin-red);
  color: #fff;
  box-shadow: 0 2px 8px rgba(58,142,246,0.35);
}
.btn-primary:hover { background: var(--acc-dark); }
.btn-secondary {
  background: var(--fill2);
  color: var(--label2);
  border: none;
}
.btn-secondary:hover { background: var(--fill1); }
.btn-danger {
  background: rgba(255,59,48,0.10);
  color: #FF3B30;
  border: none;
}
.btn-danger:hover { background: rgba(255,59,48,0.16); }
.btn-sm { padding: 5px 12px; font-size: 12px; font-weight: 600; }

/* ── CONTENT ── */
#content { padding: 20px 24px; }
.view { display: none; }
.view.active { display: block; }

/* ── DASHBOARD HERO ── */
.dash-hero {
  background: linear-gradient(145deg, #EAF3FF 0%, #F5EEFF 50%, #E6FAF4 100%);
  border-radius: var(--r-xl);
  padding: 24px 26px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--sh-sm);
}
.dash-hero::before {
  content: '🎞️';
  position: absolute;
  right: 130px; top: 10px;
  font-size: 48px;
  opacity: 0.15;
  transform: rotate(-10deg);
}
.dash-hero::after {
  content: '🍿';
  position: absolute;
  right: 22px; bottom: 6px;
  font-size: 56px;
  opacity: 0.15;
  transform: rotate(8deg);
}
.dash-title {
  font-size: 26px;
  font-weight: 800;
  color: var(--label);
  margin-bottom: 4px;
  letter-spacing: -0.5px;
}
.dash-title span { color: var(--cin-red); }
.dash-sub { color: var(--label3); font-size: 14px; font-weight: 500; }

/* ── STATS ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 7px;
  margin-bottom: 22px;
}
.stat-card {
  background: var(--sys-elevated);
  border-radius: var(--r-md);
  box-shadow: var(--sh-sm);
  transition: transform 0.15s, box-shadow 0.15s;
  animation: iosPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  aspect-ratio: 1 / 1;
  padding: 6px 4px;
}
.stat-card:nth-child(2){animation-delay:.06s}
.stat-card:nth-child(3){animation-delay:.12s}
.stat-card:nth-child(4){animation-delay:.18s}
.stat-card:nth-child(5){animation-delay:.24s}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--sh-md); }
.stat-card:active { transform: scale(0.93); }
@keyframes iosPop {
  from { opacity:0; transform:scale(0.85) translateY(6px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}
.stat-icon {
  font-size: 20px;
  line-height: 1;
}
.stat-card:nth-child(1) .stat-icon { filter: none; }
.stat-card:nth-child(2) .stat-icon { filter: none; }
.stat-card:nth-child(3) .stat-icon { filter: none; }
.stat-card:nth-child(4) .stat-icon { filter: none; }
.stat-card:nth-child(5) .stat-icon { filter: none; }
.stat-val {
  font-size: 18px;
  font-weight: 800;
  color: var(--label);
  line-height: 1;
  letter-spacing: -0.5px;
}
.stat-lbl {
  font-size: 9px;
  color: var(--label3);
  font-weight: 700;
  letter-spacing: 0.1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: 100%;
  text-align: center;
  text-transform: uppercase;
}

/* ── SECTION TITLE ── */
.sec-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--label);
  margin-bottom: 12px;
  letter-spacing: -0.4px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── NOW WATCHING CARDS ── */
.now-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(265px, 1fr));
  gap: 10px;
  margin-bottom: 24px;
}
.now-card {
  background: var(--sys-elevated);
  border-radius: var(--r-lg);
  overflow: hidden;
  display: flex;
  transition: transform 0.15s, box-shadow 0.15s;
  cursor: pointer;
  box-shadow: var(--sh-sm);
}
.now-card:hover { transform: translateY(-2px); box-shadow: var(--sh-md); }
.now-card:active { transform: scale(0.98); }
.now-poster {
  width: 72px; min-width: 72px;
  background: var(--fill3);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; overflow: hidden;
}
.now-poster img { width:100%; height:100%; object-fit:cover; }
.now-body { padding: 12px 14px; flex: 1; min-width: 0; }
.now-title { font-size: 14px; font-weight: 700; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.2px; }
.now-meta { font-size: 11px; color: var(--label3); margin-bottom: 8px; font-weight: 500; }
.prog-bar { height: 4px; background: var(--fill2); border-radius: 4px; overflow: hidden; margin-bottom: 5px; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--cin-red), var(--cin-gold)); border-radius: 4px; transition: width 0.4s ease; }
.now-ep { font-size: 11px; color: var(--label3); font-weight: 600; }

/* ── FILTER BAR ── */
.filter-bar { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.chip {
  padding: 6px 14px;
  border-radius: var(--r-pill);
  background: var(--sys-elevated);
  color: var(--label2);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  border: none;
  box-shadow: var(--sh-sm);
  letter-spacing: -0.1px;
}
.chip:hover { background: var(--fill2); }
.chip:active { transform: scale(0.96); }
.chip.active {
  background: var(--cin-red);
  color: #fff;
  box-shadow: 0 2px 8px rgba(58,142,246,0.30);
}
.filter-lbl { font-size: 11px; color: var(--label3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; }

/* ── MEDIA GRID ── */
.media-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}
.media-card {
  background: var(--sys-elevated);
  border-radius: var(--r-lg);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.34,1.2,0.64,1), box-shadow 0.2s;
  position: relative;
  box-shadow: var(--sh-sm);
  animation: iosFadeUp 0.3s ease both;
}
.media-card:nth-child(2){animation-delay:.04s}
.media-card:nth-child(3){animation-delay:.08s}
.media-card:nth-child(4){animation-delay:.12s}
.media-card:nth-child(5){animation-delay:.16s}
@keyframes iosFadeUp {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}
.media-card:hover { transform: translateY(-4px) scale(1.02); box-shadow: var(--sh-md); }
.media-card:active { transform: scale(0.97); }
.card-poster {
  aspect-ratio: 2/3;
  background: var(--fill3);
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; position: relative; overflow: hidden;
}
.card-poster img { width:100%; height:100%; object-fit:cover; }
.card-overlay {
  position: absolute; bottom:0; left:0; right:0;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  padding: 20px 10px 10px;
  opacity: 0; transition: opacity 0.2s;
}
.media-card:hover .card-overlay { opacity: 1; }
.card-overlay div { color: rgba(255,255,255,0.9); font-size: 11px; font-weight: 600; }
.card-body { padding: 10px 11px 12px; }
.card-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; line-height: 1.3; color: var(--label); letter-spacing: -0.1px; }
.card-year { font-size: 11px; color: var(--label3); margin-bottom: 5px; font-weight: 500; }
.card-rating { display: flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 700; color: var(--label2); }
.star-ico { color: var(--cin-gold); }
.imdb-badge { display:inline-flex; align-items:center; background:#F5C518; color:#000; font-size:10px; font-weight:800; padding:2px 6px; border-radius:5px; margin-left:3px; }

/* ── STATUS BADGES ── */
.badge { display:inline-flex; align-items:center; padding:3px 9px; border-radius:var(--r-pill); font-size:10px; font-weight:700; letter-spacing:0.2px; }
.badge-watching { background:var(--cin-green-bg); color:#1A8A4A; }
.badge-pending  { background:var(--cin-red-bg);  color:var(--cin-red); }
.badge-finished { background:var(--cin-gold-bg);  color:#1A9299; }
.badge-dropped  { background:rgba(255,59,48,.10); color:#FF3B30; }
.media-card .badge { position:absolute; top:8px; left:8px; z-index:2; backdrop-filter:blur(8px); background:rgba(255,255,255,0.88); color:var(--label2); font-size:9px; padding:3px 8px; box-shadow:0 1px 4px rgba(0,0,0,.10); }
.media-card .badge-watching { color: #1A8A4A; }
.media-card .badge-finished { color: #1A9299; }
.media-card .badge-dropped  { color: #FF3B30; }

/* ── PLATFORM BADGES ── */
.plat { display:inline-flex; align-items:center; padding:3px 9px; border-radius:var(--r-pill); font-size:11px; font-weight:700; }
.plat-Netflix  { background:rgba(229,9,20,.10);   color:#CC0000; }
.plat-HBO      { background:rgba(100,0,180,.10);  color:#6600AA; }
.plat-Amazon   { background:rgba(0,168,225,.10);  color:#0077AA; }
.plat-Disney   { background:rgba(17,60,207,.10);  color:#113CCF; }
.plat-Apple    { background:var(--fill2);          color:var(--label2); }
.plat-Descarga { background:var(--cin-green-bg);  color:#1A8A4A; }
.plat-TV       { background:var(--cin-amber-bg); color:#B85500; }
.plat-otro     { background:var(--fill2);          color:var(--label3); }

/* ── DETAIL PANEL ── (iOS Sheet) */
#panel-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.3);
  backdrop-filter: blur(4px);
  z-index:199; opacity:0; pointer-events:none; transition:opacity .25s;
}
#panel-overlay.open { opacity:1; pointer-events:all; }
#detail-panel {
  position:fixed; top:0; right:-100%;
  width: min(860px, 100vw);
  height:100vh;
  background: var(--sys-bg);
  z-index:200; overflow-y:auto;
  transition: right .35s cubic-bezier(0.4,0,0.2,1);
  box-shadow: var(--sh-panel);
}
#detail-panel.open { right:0; }
.det-header { position:relative; height:230px; overflow:hidden; }
.det-backdrop {
  position:absolute; inset:0;
  background:linear-gradient(135deg, #EAF3FF, #F5EEFF);
  display:flex; align-items:center; justify-content:center; font-size:80px;
}
.det-backdrop img { width:100%; height:100%; object-fit:cover; filter:blur(12px) brightness(0.6) saturate(0.9); }
.det-header-content {
  position:absolute; bottom:0; left:0; right:0;
  padding:16px 22px;
  background:linear-gradient(transparent, var(--sys-bg));
  display:flex; gap:16px; align-items:flex-end;
}
.det-poster {
  width:86px; min-width:86px;
  aspect-ratio:2/3;
  border-radius:var(--r-md);
  overflow:hidden;
  background:var(--fill3);
  display:flex; align-items:center; justify-content:center;
  font-size:30px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.22);
  border: 2px solid rgba(255,255,255,0.6);
  flex-shrink:0;
}
.det-poster img { width:100%; height:100%; object-fit:cover; }
.det-close {
  position:absolute; top:12px; right:12px;
  width:30px; height:30px;
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(8px);
  border:none; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:14px; color:var(--label3); z-index:10;
  transition: all .2s; box-shadow:0 2px 8px rgba(0,0,0,.12);
  font-weight: 700;
}
.det-close:hover { background:#FF3B30; color:#fff; transform:rotate(90deg); }
.det-title { font-size:21px; font-weight:800; line-height:1.2; margin-bottom:4px; color:var(--label); letter-spacing:-0.4px; }
.det-meta { font-size:12px; color:var(--label3); margin-bottom:7px; font-weight:500; }
.det-ratings { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.rat-block { display:flex; align-items:center; gap:5px; }
.rat-lbl { font-size:10px; color:var(--label3); font-weight:700; text-transform:uppercase; letter-spacing:0.8px; }
.rat-val { font-size:18px; color:var(--cin-red); font-weight:800; letter-spacing:-0.3px; }
.det-body { padding:18px 22px; }
.det-actions { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }

/* ── TABS (iOS Segmented / Underline) ── */
.tabs {
  display:flex;
  border-bottom: 1px solid var(--sep);
  margin-bottom:16px;
  overflow-x:auto;
  gap:0;
}
.tab {
  padding:9px 16px;
  cursor:pointer;
  font-size:14px;
  font-weight:600;
  color:var(--label3);
  border-bottom:2px solid transparent;
  transition: all .15s;
  white-space:nowrap;
  letter-spacing:-0.1px;
}
.tab:hover { color:var(--label2); }
.tab.active { color:var(--cin-red); border-bottom-color:var(--cin-red); font-weight:700; }
.tab-pane { display:none; }
.tab-pane.active { display:block; }

/* ── SEASONS (iOS Grouped Lists) ── */
.season-acc {
  background:var(--sys-elevated);
  border-radius:var(--r-lg);
  overflow:hidden;
  margin-bottom:8px;
  box-shadow:var(--sh-sm);
  transition:box-shadow .2s;
}
.season-acc.open { box-shadow:var(--sh-md); }
.season-head {
  display:flex; align-items:center; gap:10px;
  padding:12px 16px;
  cursor:pointer;
  background:var(--sys-elevated);
  transition:background .1s;
  user-select:none;
}
.season-head:active { background:var(--fill3); }
.season-hl { flex:1; }
.s-title { font-size:14px; font-weight:700; margin-bottom:1px; color:var(--label); letter-spacing:-0.2px; }
.s-desc-toggle { font-size:11px; color:var(--cin-red); font-weight:600; cursor:pointer; list-style:none; display:inline-flex; align-items:center; gap:3px; }
.s-desc-toggle::-webkit-details-marker { display:none; }
.s-desc-toggle::before { content:'▶'; font-size:8px; transition:transform .2s; display:inline-block; }
details[open] .s-desc-toggle::before { transform:rotate(90deg); }
.s-details .s-desc { font-size:12px; color:var(--label3); font-weight:500; margin-top:4px; padding:7px 10px; background:var(--fill3); border-radius:var(--r-sm); line-height:1.5; }
.ep-details .ep-desc { font-size:12px; color:var(--label3); line-height:1.5; font-weight:500; margin-top:4px; padding:6px 9px; background:var(--fill3); border-radius:var(--r-sm); }
.ep-desc-toggle { font-size:11px; color:var(--cin-red); font-weight:600; cursor:pointer; list-style:none; display:inline-flex; align-items:center; gap:3px; }
.ep-desc-toggle::-webkit-details-marker { display:none; }
.ep-desc-toggle::before { content:'▶'; font-size:8px; transition:transform .2s; display:inline-block; }
details[open] .ep-desc-toggle::before { transform:rotate(90deg); }
.s-stats { font-size:11px; color:var(--label3); font-weight:500; margin-top:2px; }
.s-avg { font-size:15px; font-weight:800; color:var(--cin-red); letter-spacing:-0.3px; }
.s-chevron { transition:transform .25s; color:var(--label4); font-size:12px; margin-left:2px; }
.season-acc.open .s-chevron { transform:rotate(180deg); }
.season-body { display:none; border-top:1px solid var(--sep); }
.season-acc.open .season-body { display:block; }
.season-rating-input {
  width:46px; padding:4px 6px; font-size:13px; font-weight:700; text-align:center;
  color:var(--cin-red); background:var(--cin-red-bg); border:none; border-radius:var(--r-sm);
  outline:none; font-family:inherit;
}
.season-rating-input:focus { box-shadow:0 0 0 2px var(--cin-red); }

/* ── EPISODES ── */
.ep-row {
  display:flex; gap:9px;
  padding:10px 16px;
  border-bottom:1px solid var(--sep);
  align-items:flex-start;
  transition:background .1s;
}
.ep-row:last-child { border-bottom:none; }
.ep-row:hover { background:var(--fill3); }
.ep-check {
  width:22px; height:22px;
  border-radius:50%;
  border:2px solid var(--sep-opaque);
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:11px;
  transition:all .2s;
  flex-shrink:0; margin-top:1px;
  font-weight:700;
}
.ep-check:active { transform:scale(0.88); }
.ep-check.done { border-color:var(--cin-green); background:var(--cin-green); color:#fff; }
.ep-check.cur { border-color:var(--cin-red); background:var(--cin-red-bg); color:var(--cin-red); }
.ep-num { font-size:11px; color:var(--label4); min-width:24px; padding-top:2px; font-weight:600; }
.ep-info { flex:1; }
.ep-title { font-size:13px; font-weight:700; margin-bottom:2px; color:var(--label); letter-spacing:-0.1px; }
.ep-right { display:flex; flex-direction:column; align-items:flex-end; gap:5px; min-width:90px; }
.ep-rating-input {
  width:46px; padding:4px 6px; font-size:13px; font-weight:700; text-align:center;
  color:var(--cin-red); background:var(--cin-red-bg); border:none; border-radius:var(--r-sm);
  outline:none; font-family:inherit;
}
.ep-rating-input:focus { box-shadow:0 0 0 2px var(--cin-red); }
.ep-rating-input::-webkit-inner-spin-button,
.season-rating-input::-webkit-inner-spin-button { opacity:1; }

/* ── FORMS ── */
.form-group { margin-bottom:13px; }
.form-label {
  display:block; font-size:12px; font-weight:700;
  color:var(--label3); letter-spacing:0.4px;
  text-transform:uppercase; margin-bottom:5px;
}
.form-input, .form-select, .form-textarea {
  width:100%; background:var(--fill2); border:none;
  border-radius:var(--r-md); padding:10px 13px;
  color:var(--label); font-family:inherit;
  font-size:15px; font-weight:500; outline:none;
  transition:background .15s, box-shadow .15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  background:var(--fill1);
  box-shadow:0 0 0 3px rgba(58,142,246,0.25);
}
.form-select option { background:var(--sys-bg2); color:var(--label); }
.form-textarea { min-height:76px; resize:vertical; line-height:1.6; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-hint { font-size:11px; color:var(--label3); margin-top:3px; font-weight:500; }

/* ── MODAL (iOS Sheet) ── */
#modal-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(8px);
  z-index:300; display:none;
  align-items:center; justify-content:center; padding:20px;
}
#modal-overlay.open { display:flex; }
.modal {
  background:var(--sys-bg);
  border-radius:var(--r-xl);
  width:100%; max-width:560px;
  max-height:90vh; overflow-y:auto;
  animation:iosSheetIn .3s cubic-bezier(0.34,1.4,0.64,1);
  box-shadow:0 24px 64px rgba(0,0,0,0.18), 0 0 0 0.5px rgba(0,0,0,0.06);
}
@keyframes iosSheetIn {
  from { opacity:0; transform:scale(0.9) translateY(16px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}
.modal-head {
  padding:18px 20px 12px;
  border-bottom:1px solid var(--sep);
  display:flex; justify-content:space-between; align-items:center;
  background:rgba(242,242,247,0.7);
  backdrop-filter:blur(20px);
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  position:sticky; top:0; z-index:1;
}
.modal-title { font-size:17px; font-weight:700; color:var(--label); letter-spacing:-0.2px; }
.modal-x {
  cursor:pointer; color:var(--label3);
  width:28px; height:28px;
  display:flex; align-items:center; justify-content:center;
  border-radius:50%; transition:all .15s;
  background:var(--fill2); border:none;
  font-size:14px; font-weight:700;
}
.modal-x:hover { background:rgba(255,59,48,.15); color:#FF3B30; }
.modal-body { padding:18px 20px; }
.modal-foot {
  padding:12px 20px 16px;
  border-top:1px solid var(--sep);
  display:flex; gap:8px; justify-content:flex-end;
  background:rgba(242,242,247,0.7);
  backdrop-filter:blur(20px);
  position:sticky; bottom:0;
  border-radius:0 0 var(--r-xl) var(--r-xl);
}

/* ── TMDB SEARCH ── */
.search-block {
  background:linear-gradient(135deg, var(--cin-red-bg), rgba(45,195,201,0.08));
  border:1.5px solid rgba(58,142,246,0.2);
  border-radius:var(--r-lg);
  padding:13px 15px; margin-bottom:16px;
}
.search-block-lbl { font-size:11px; color:var(--cin-red); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:7px; display:flex; align-items:center; gap:5px; font-weight:700; }
.search-block-row { display:flex; gap:7px; }
.tmdb-results { margin-top:8px; display:flex; flex-direction:column; gap:4px; max-height:240px; overflow-y:auto; }
.tmdb-item {
  display:flex; gap:9px; align-items:center;
  padding:8px 10px;
  background:var(--sys-elevated);
  border-radius:var(--r-md);
  cursor:pointer; transition:all .15s;
}
.tmdb-item:hover { background:var(--fill2); transform:translateX(2px); }
.tmdb-item:active { transform:scale(0.98); }
.tmdb-thumb { width:32px; height:47px; object-fit:cover; border-radius:6px; background:var(--fill3); flex-shrink:0; }
.tmdb-info { flex:1; min-width:0; }
.tmdb-name { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--label); letter-spacing:-0.1px; }
.tmdb-year { font-size:11px; color:var(--label3); font-weight:500; margin-top:1px; }
.tmdb-score { font-size:12px; color:var(--cin-red); font-weight:700; white-space:nowrap; }
.tmdb-status { font-size:12px; color:var(--label3); padding:5px 0; text-align:center; font-weight:500; }
.tmdb-ok {
  display:flex; align-items:center; gap:7px; padding:9px 12px; margin-top:7px;
  background:var(--cin-green-bg); border-radius:var(--r-md);
  font-size:12px; color:#1A8A4A; font-weight:700;
}

/* ── COMMENTS ── */
.comment-list { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
.comment {
  background:var(--sys-elevated);
  border-radius:var(--r-md);
  padding:11px 13px;
  box-shadow:var(--sh-sm);
  border-left:3px solid var(--cin-red);
}
.comment-date { font-size:10px; color:var(--label3); margin-bottom:4px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; }
.comment-text { font-size:13px; line-height:1.6; color:var(--label2); font-weight:500; }

/* ── TAGS ── */
.tags { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px; }
.tag { padding:4px 10px; background:var(--fill2); border-radius:var(--r-pill); font-size:11px; color:var(--label2); font-weight:600; }

/* ── QUOTES & AWARDS ── */
.quote-item {
  border-left:3px solid var(--cin-rose);
  padding:7px 13px; margin-bottom:7px;
  background:var(--cin-rose-tint);
  border-radius:0 var(--r-md) var(--r-md) 0;
  font-style:italic; font-size:14px;
  color:var(--label2); line-height:1.6; font-weight:500;
}
.award-tag {
  padding:4px 11px;
  background:var(--cin-gold-bg);
  border-radius:var(--r-pill);
  font-size:11px; color:#B85500; font-weight:700;
  display:inline-flex; align-items:center; gap:3px;
}

/* ── PROGRESS TRACKER ── */
.prog-tracker {
  background:var(--sys-elevated);
  border-radius:var(--r-lg);
  padding:15px; margin-bottom:15px;
  box-shadow:var(--sh-sm);
}
.pt-lbl { font-size:11px; font-weight:700; color:var(--label3); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:10px; }

/* ── NUMERIC RATING PICKER ── */
.num-picker-wrap {
  display:flex; align-items:center; gap:10px; margin-top:4px;
}
.num-picker-wrap input {
  width:80px; font-size:24px; font-weight:800; text-align:center;
  color:var(--cin-red); background:var(--cin-red-bg);
  border:none; border-radius:var(--r-md); padding:8px;
  font-family:inherit; outline:none;
}
.num-picker-wrap input:focus { box-shadow:0 0 0 3px rgba(58,142,246,0.3); }

/* ── PENDING / RECENT ITEMS ── */
.pending-list { display:flex; flex-direction:column; gap:8px; }
.pend-item {
  display:flex; gap:12px; align-items:center;
  background:var(--sys-elevated);
  border-radius:var(--r-lg);
  padding:12px 14px;
  cursor:pointer; transition:all .15s;
  box-shadow:var(--sh-sm);
}
.pend-item:hover { box-shadow:var(--sh-md); transform:translateX(3px); }
.pend-item:active { transform:scale(0.98); }
.pend-thumb {
  width:44px; height:44px;
  background:var(--fill3);
  border-radius:var(--r-md);
  display:flex; align-items:center; justify-content:center;
  font-size:20px; overflow:hidden; flex-shrink:0;
}
.pend-thumb img { width:100%; height:100%; object-fit:cover; }
.pend-info { flex:1; }
.pend-title { font-size:14px; font-weight:700; margin-bottom:2px; color:var(--label); letter-spacing:-0.2px; }
.pend-meta { font-size:11px; color:var(--label3); font-weight:500; }

/* ── EMPTY STATE ── */
.empty { text-align:center; padding:52px 28px; color:var(--label3); }
.empty-ico { font-size:56px; margin-bottom:12px; opacity:0.5; }
.empty-title { font-size:19px; font-weight:800; margin-bottom:5px; color:var(--label2); letter-spacing:-0.3px; }
.empty-sub { font-size:14px; font-weight:500; }

/* ── MISC ── */
.divider { height:1px; background:var(--sep); margin:16px 0; }

/* ── HAMBURGER ── */
#hamburger {
  display:none;
  background:var(--fill2); border:none;
  border-radius:var(--r-sm);
  color:var(--label2); font-size:17px;
  cursor:pointer; padding:5px 10px; line-height:1;
  transition:background .15s;
}
#hamburger:hover { background:var(--fill1); }
#sidebar-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.3);
  z-index:149; opacity:0; pointer-events:none;
  transition:opacity .25s; display:none;
  backdrop-filter:blur(2px);
}
#sidebar-overlay.open { opacity:1; pointer-events:all; }

@media(max-width:768px){
  #hamburger{ display:flex; align-items:center; }
  #sidebar-overlay{ display:block; }
  #sidebar{
    position:fixed; left:-270px; top:0;
    height:100vh; z-index:150;
    transition:left .3s cubic-bezier(.4,0,.2,1);
    box-shadow:var(--sh-lg);
  }
  #sidebar.open{ left:0; }
  #content{ padding:14px 16px; }
  .topbar{ padding:10px 14px; }
  .media-grid{ grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; }
  .form-row{ grid-template-columns:1fr; }
  #detail-panel{ width:100vw; }
}
</style>
</head>
<body>
<div id="sidebar-overlay"></div>
<div id="app">

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="logo">
    <div class="logo-title">CINELOG</div>
    <div class="logo-sub">Tu universo audiovisual</div>
  </div>
  <nav>
    <div class="nav-sec">General</div>
    <div class="nav-item active" id="nav-dashboard"><span class="ico">🏠</span>Dashboard</div>
    <div class="nav-sec">Series</div>
    <div class="nav-item" id="nav-watching"><span class="ico">▶️</span>Viendo ahora<span class="nav-badge" id="b-watching">0</span></div>
    <div class="nav-item" id="nav-series"><span class="ico">📺</span>Mis series<span class="nav-badge" id="b-series">0</span></div>
    <div class="nav-item" id="nav-pending-series"><span class="ico">🕐</span>Pendientes<span class="nav-badge" id="b-ps">0</span></div>
    <div class="nav-sec">Películas</div>
    <div class="nav-item" id="nav-movies"><span class="ico">🎬</span>Mis películas<span class="nav-badge" id="b-movies">0</span></div>
    <div class="nav-item" id="nav-pending-movies"><span class="ico">🕐</span>Pendientes<span class="nav-badge" id="b-pm">0</span></div>
  </nav>
  <div class="sidebar-foot">
    <div class="stat-mini">
      <div class="stat-row"><span>Series</span><b id="sm-s">0</b></div>
      <div class="stat-row"><span>Películas</span><b id="sm-m">0</b></div>
      <div class="stat-row"><span>Eps vistos</span><b id="sm-e">0</b></div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main id="main">
  <div class="topbar">
    <button id="hamburger">☰</button>
    <div class="topbar-title" id="topbar-title">Dashboard</div>
    <div class="search-wrap"><span>🔍</span><input type="text" id="search-input" placeholder="Buscar..."></div>
    <button class="btn btn-primary" id="btn-add" style="display:none">+ Añadir</button>
  </div>
  <div id="content">
    <div id="view-dashboard" class="view active">
      <div class="stats-grid" id="dash-stats"></div>
      <div class="sec-title">▶ Viendo ahora</div>
      <div class="now-grid" id="now-list"></div>
      <div class="sec-title">◈ Actividad reciente</div>
      <div class="pending-list" id="recent-list"></div>
    </div>
    <div id="view-watching" class="view"><div class="now-grid" id="watching-grid"></div></div>
    <div id="view-series" class="view"><div class="filter-bar" id="series-filters"></div><div class="media-grid" id="series-grid"></div></div>
    <div id="view-pending-series" class="view"><div class="pending-list" id="ps-list"></div></div>
    <div id="view-movies" class="view"><div class="filter-bar" id="movies-filters"></div><div class="media-grid" id="movies-grid"></div></div>
    <div id="view-pending-movies" class="view"><div class="pending-list" id="pm-list"></div></div>
  </div>
</main>
</div>

<!-- DETAIL PANEL -->
<div id="panel-overlay"></div>
<div id="detail-panel"><div id="detail-content"></div></div>

<!-- MODAL -->
<div id="modal-overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-x" id="modal-x">✕</div>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let S = { series:[], movies:[], view:'dashboard', editId:null, editType:null };
let _pendingSeasons = [];
let _activeSeriesFilter = null;
let _activeMoviesFilter = null;

// ═══════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════
function save() {
  const data = JSON.stringify({ series: S.series, movies: S.movies });
  try { localStorage.setItem('cinelog', data); } catch(e) {
    try { sessionStorage.setItem('cinelog', data); } catch(e2) {} }
  updateBadges();
}
function load() {
  let raw = null;
  try { raw = localStorage.getItem('cinelog'); } catch(e) {}
  if (!raw) { try { raw = sessionStorage.getItem('cinelog'); } catch(e) {} }
  if (raw) { try { const p = JSON.parse(raw); S.series = p.series||[]; S.movies = p.movies||[]; } catch(e) {} }
  if (!S.series) S.series = [];
  if (!S.movies) S.movies = [];
}

// ═══════════════════════════════════════════
//  BADGES
// ═══════════════════════════════════════════
function updateBadges() {
  const ns = S.series.filter(s=>s.status!=='pending');
  const nm = S.movies.filter(m=>m.status!=='pending');
  const nw = S.series.filter(s=>s.status==='watching');
  const ps = S.series.filter(s=>s.status==='pending');
  const pm = S.movies.filter(m=>m.status==='pending');
  let eps=0; S.series.forEach(s=>(s.seasons||[]).forEach(t=>(t.episodes||[]).forEach(e=>{ if(e.watched) eps++; })));
  id('b-watching').textContent=nw.length; id('b-series').textContent=ns.length;
  id('b-ps').textContent=ps.length; id('b-movies').textContent=nm.length; id('b-pm').textContent=pm.length;
  id('sm-s').textContent=ns.length; id('sm-m').textContent=nm.length; id('sm-e').textContent=eps;
}

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function id(x){return document.getElementById(x)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function uid(){return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2)}
function platClass(p){const m={'Netflix':'Netflix','HBO Max':'HBO','Amazon Prime':'Amazon','Disney+':'Disney','Apple TV+':'Apple','Descarga':'Descarga','Canal TV':'TV'};return 'plat plat-'+(m[p]||'otro')}
function statusBadge(s){const m={watching:['Viendo','watching'],finished:['Finalizada','finished'],dropped:['Abandonada','dropped'],pending:['Pendiente','pending']};const[l,c]=m[s]||['?','pending'];return '<span class="badge badge-'+c+'">'+l+'</span>'}
function posterHTML(item, big=false){
  if(item.posterUrl) return '<img src="'+esc(item.posterUrl)+'" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display=\'none\'">';
  return '<span style="font-size:'+(big?'48':'28')+'px">'+(item.emoji||'🎬')+'</span>';
}
function avgRating(item){
  // Series: average of season scores (manual if set, else calculated from eps)
  if(!item.seasons||!item.seasons.length) return item.userRating||null;
  let sum=0,cnt=0;
  item.seasons.forEach(t=>{
    const r=t.userRating||seasonAvg(t); // prefer manual season rating
    if(r){sum+=parseFloat(r);cnt++;}
  });
  const calculated=cnt>0?(sum/cnt).toFixed(1):null;
  // Series userRating overrides everything if set manually
  return item.userRating||calculated;
}
function seasonAvg(t){
  // Season: average of episode scores, or manual userRating
  if(!t.episodes||!t.episodes.length) return t.userRating||null;
  let sum=0,cnt=0;
  t.episodes.forEach(e=>{if(e.rating){sum+=parseFloat(e.rating);cnt++;}});
  const calculated=cnt>0?(sum/cnt).toFixed(1):null;
  return t.userRating||calculated; // manual overrides calculated
}

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
const VIEW_TITLES={dashboard:'Dashboard',watching:'Viendo ahora',series:'Mis series','pending-series':'Series pendientes',movies:'Mis películas','pending-movies':'Películas pendientes'};
function navigate(view){
  S.view=view;
  closeSidebar();
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  const nav=id('nav-'+view); if(nav) nav.classList.add('active');
  const vEl=id('view-'+view); if(vEl) vEl.classList.add('active');
  id('topbar-title').textContent=VIEW_TITLES[view]||view;
  id('btn-add').style.display=['series','movies','pending-series','pending-movies'].includes(view)?'inline-flex':'none';
  renderView();
}

// ═══════════════════════════════════════════
//  SIDEBAR MOBILE
// ═══════════════════════════════════════════
function toggleSidebar(){id('sidebar').classList.toggle('open');id('sidebar-overlay').classList.toggle('open')}
function closeSidebar(){id('sidebar').classList.remove('open');id('sidebar-overlay').classList.remove('open')}

// ═══════════════════════════════════════════
//  RENDER VIEWS
// ═══════════════════════════════════════════
function renderView(){
  const v=S.view;
  if(v==='dashboard') renderDashboard();
  else if(v==='watching') renderWatching();
  else if(v==='series') renderSeriesGrid();
  else if(v==='pending-series') renderPendingList('series');
  else if(v==='movies') renderMoviesGrid();
  else if(v==='pending-movies') renderPendingList('movies');
}

function renderDashboard(){
  const ns=S.series.filter(s=>s.status!=='pending'), nm=S.movies.filter(m=>m.status!=='pending');
  const nw=S.series.filter(s=>s.status==='watching');
  let eps=0; S.series.forEach(s=>(s.seasons||[]).forEach(t=>(t.episodes||[]).forEach(e=>{if(e.watched)eps++;})));
  id('dash-stats').innerHTML=`
    <div class="stat-card" data-action="nav" data-nav="series"><div class="stat-icon">📺</div><div class="stat-val">${ns.length}</div><div class="stat-lbl">Series</div></div>
    <div class="stat-card" data-action="nav" data-nav="movies"><div class="stat-icon">🎬</div><div class="stat-val">${nm.length}</div><div class="stat-lbl">Películas</div></div>
    <div class="stat-card" data-action="nav" data-nav="watching"><div class="stat-icon">🍿</div><div class="stat-val">${nw.length}</div><div class="stat-lbl">Viendo</div></div>
    <div class="stat-card" data-action="nav" data-nav="series"><div class="stat-icon">✅</div><div class="stat-val">${eps}</div><div class="stat-lbl">Eps vistos</div></div>
    <div class="stat-card" data-action="nav" data-nav="pending-series"><div class="stat-icon">🕐</div><div class="stat-val">${S.series.filter(s=>s.status==='pending').length+S.movies.filter(m=>m.status==='pending').length}</div><div class="stat-lbl">Pendientes</div></div>`;
  id('now-list').innerHTML = nw.length ? nw.map(s=>nowCardHTML(s)).join('') : '<div style="color:var(--text3);font-size:14px;font-weight:700">Nada en reproducción.</div>';
  const recent=[...S.series.filter(s=>s.status!=='pending'),...S.movies.filter(m=>m.status!=='pending')].sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0)).slice(0,5);
  id('recent-list').innerHTML=recent.length?recent.map(i=>pendItemHTML(i)).join(''):'<div class="empty"><div class="empty-ico">◈</div><div class="empty-title">Colección vacía</div><div class="empty-sub">Añade tu primera serie o película.</div></div>';
}

function renderWatching(){
  const nw=S.series.filter(s=>s.status==='watching');
  id('watching-grid').innerHTML=nw.length?nw.map(s=>nowCardHTML(s)).join(''):'<div class="empty" style="grid-column:1/-1"><div class="empty-ico">▶</div><div class="empty-title">Nada en reproducción</div></div>';
}

function renderSeriesGrid(q=''){
  const items=S.series.filter(s=>s.status!=='pending').filter(s=>!q||s.title.toLowerCase().includes(q.toLowerCase())).filter(s=>!_activeSeriesFilter||filterMatch(s,_activeSeriesFilter));
  const genres=new Set(),universes=new Set(),platforms=new Set();
  S.series.filter(s=>s.status!=='pending').forEach(s=>{(s.genres||[]).forEach(g=>genres.add(g));(s.universes||[]).forEach(u=>universes.add(u));if(s.platform)platforms.add(s.platform);});
  let chips='';
  if(genres.size) chips+='<span class="filter-lbl">Género:</span>'+[...genres].map(g=>'<span class="chip'+(matchesFilter(_activeSeriesFilter,'genre',g)?' active':'')+'" data-type="genre" data-val="'+esc(g)+'">'+esc(g)+'</span>').join('');
  if(universes.size) chips+='<span class="filter-lbl" style="margin-left:8px">Universo:</span>'+[...universes].map(u=>'<span class="chip'+(matchesFilter(_activeSeriesFilter,'universe',u)?' active':'')+'" data-type="universe" data-val="'+esc(u)+'">'+esc(u)+'</span>').join('');
  if(platforms.size) chips+='<span class="filter-lbl" style="margin-left:8px">Plataforma:</span>'+[...platforms].map(p=>'<span class="chip'+(matchesFilter(_activeSeriesFilter,'platform',p)?' active':'')+'" data-type="platform" data-val="'+esc(p)+'">'+esc(p)+'</span>').join('');
  chips+=['watching','finished','dropped'].map(s=>'<span class="chip'+(matchesFilter(_activeSeriesFilter,'status',s)?' active':'')+'" data-type="status" data-val="'+s+'">'+(s==='watching'?'▶ Viendo':s==='finished'?'✓ Fin':'✕ Aband.')+'</span>').join('');
  id('series-filters').innerHTML=chips;
  id('series-grid').innerHTML=items.length?items.map(s=>mediaCardHTML(s,'series')).join(''):'<div class="empty" style="grid-column:1/-1"><div class="empty-ico">◉</div><div class="empty-title">Sin series</div><div class="empty-sub">Pulsa "+ Añadir" para empezar.</div></div>';
}

function renderMoviesGrid(q=''){
  const items=S.movies.filter(m=>m.status!=='pending').filter(m=>!q||m.title.toLowerCase().includes(q.toLowerCase())).filter(m=>!_activeMoviesFilter||filterMatch(m,_activeMoviesFilter));
  const genres=new Set(),universes=new Set(),platforms=new Set();
  S.movies.filter(m=>m.status!=='pending').forEach(m=>{(m.genres||[]).forEach(g=>genres.add(g));(m.universes||[]).forEach(u=>universes.add(u));if(m.platform)platforms.add(m.platform);});
  let chips='';
  if(genres.size) chips+='<span class="filter-lbl">Género:</span>'+[...genres].map(g=>'<span class="chip'+(matchesFilter(_activeMoviesFilter,'genre',g)?' active':'')+'" data-type="genre" data-val="'+esc(g)+'">'+esc(g)+'</span>').join('');
  if(universes.size) chips+='<span class="filter-lbl" style="margin-left:8px">Universo:</span>'+[...universes].map(u=>'<span class="chip'+(matchesFilter(_activeMoviesFilter,'universe',u)?' active':'')+'" data-type="universe" data-val="'+esc(u)+'">'+esc(u)+'</span>').join('');
  if(platforms.size) chips+='<span class="filter-lbl" style="margin-left:8px">Plataforma:</span>'+[...platforms].map(p=>'<span class="chip'+(matchesFilter(_activeMoviesFilter,'platform',p)?' active':'')+'" data-type="platform" data-val="'+esc(p)+'">'+esc(p)+'</span>').join('');
  id('movies-filters').innerHTML=chips;
  id('movies-grid').innerHTML=items.length?items.map(m=>mediaCardHTML(m,'movies')).join(''):'<div class="empty" style="grid-column:1/-1"><div class="empty-ico">◈</div><div class="empty-title">Sin películas</div><div class="empty-sub">Pulsa "+ Añadir" para empezar.</div></div>';
}

function renderPendingList(type){
  const arr=type==='series'?S.series.filter(s=>s.status==='pending'):S.movies.filter(m=>m.status==='pending');
  const target=type==='series'?'ps-list':'pm-list';
  id(target).innerHTML=arr.length?arr.map(i=>pendItemHTML(i)).join(''):'<div class="empty"><div class="empty-ico">◷</div><div class="empty-title">Sin pendientes</div></div>';
}

function filterMatch(item,f){
  if(!f) return true;
  if(f.type==='genre') return (item.genres||[]).includes(f.val);
  if(f.type==='universe') return (item.universes||[]).includes(f.val);
  if(f.type==='platform') return item.platform===f.val;
  if(f.type==='status') return item.status===f.val;
  return true;
}
function matchesFilter(f,type,val){return f&&f.type===type&&f.val===val}

function nowCardHTML(s){
  let total=0,watched=0,curEp='',curMin='';
  (s.seasons||[]).forEach(t=>(t.episodes||[]).forEach(e=>{total++;if(e.watched)watched++;if(e.current){curEp='T'+t.number+' E'+e.number+(e.title?' · '+e.title:'');if(e.minute)curMin=' · min '+e.minute;}}));
  const pct=total?Math.round(watched/total*100):0;
  return '<div class="now-card" data-id="'+s.id+'" data-type="series">'
    +'<div class="now-poster">'+posterHTML(s)+'</div>'
    +'<div class="now-body"><div class="now-title">'+esc(s.title)+'</div>'
    +'<div class="now-meta">'+esc(s.platform||'')+(s.startYear?' · '+s.startYear:'')+'</div>'
    +'<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>'
    +'<div class="now-ep">'+(curEp?esc(curEp)+curMin:watched+'/'+total+' caps.')+'</div></div></div>';
}

function mediaCardHTML(item,type){
  const avg=type==='series'?avgRating(item):item.userRating;
  return '<div class="media-card" data-id="'+item.id+'" data-type="'+type+'">'
    +statusBadge(item.status)
    +'<div class="card-poster">'+posterHTML(item,true)
    +'<div class="card-overlay"><div>'+(item.genres||[]).slice(0,2).join(' · ')+'</div>'
    +((item.universes||[]).length?'<div style="color:var(--sky)">'+esc(item.universes[0])+'</div>':'')
    +'</div></div>'
    +'<div class="card-body"><div class="card-title">'+esc(item.title)+'</div>'
    +'<div class="card-year">'+(item.startYear||'?')+(item.endYear?'–'+item.endYear:'')+'</div>'
    +'<div class="card-rating">'+(avg?'<span class="star-ico">★</span><span>'+avg+'</span>':'<span style="color:var(--text3)">Sin puntuar</span>')
    +(item.imdbRating?'<span class="imdb-badge">IMDb '+item.imdbRating+'</span>':'')
    +'</div></div></div>';
}

function pendItemHTML(item){
  const type=item.type||'series';
  const avg=type==='series'?avgRating(item):item.userRating;
  return '<div class="pend-item" data-id="'+item.id+'" data-type="'+type+'">'
    +'<div class="pend-thumb">'+posterHTML(item)+'</div>'
    +'<div class="pend-info"><div class="pend-title">'+esc(item.title)+'</div>'
    +'<div class="pend-meta">'+(item.startYear||'')+(item.endYear?'–'+item.endYear:'')+' · '+esc(item.platform||'')+(item.genres&&item.genres.length?' · '+item.genres.slice(0,2).join(', '):'')+'</div></div>'
    +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">'
    +statusBadge(item.status)
    +(avg?'<div style="font-family:Fredoka,sans-serif;font-size:15px;color:var(--acc2);font-weight:700">★ '+avg+'</div>':'')
    +'</div></div>';
}

function openDetail(itemId, type){
  const item=type==='series'?S.series.find(s=>s.id===itemId):S.movies.find(m=>m.id===itemId);
  if(!item) return;
  id('detail-content').innerHTML=type==='series'?seriesDetailHTML(item):movieDetailHTML(item);
  id('detail-panel').classList.add('open');
  id('panel-overlay').classList.add('open');
}
function closePanel(){id('detail-panel').classList.remove('open');id('panel-overlay').classList.remove('open')}

function currentEpTrackerHTML(s){
  let ct=null,cs=null;
  (s.seasons||[]).forEach(t=>(t.episodes||[]).forEach(e=>{if(e.current){ct=e;cs=t;}}));
  if(!ct) return '<div style="color:var(--text3);font-size:14px;font-weight:700;padding:14px;background:var(--bg3);border-radius:11px;border:2px solid var(--border)">Marca un capítulo como actual en Temporadas.</div>';
  return '<div class="prog-tracker"><div class="pt-lbl">Episodio actual</div>'
    +'<div style="font-size:15px;font-weight:800;margin-bottom:3px">'+esc(ct.title||'Sin título')+'</div>'
    +'<div style="font-size:12px;color:var(--text3);margin-bottom:11px;font-weight:700">T'+cs.number+' · Ep '+ct.number+'</div>'
    +'<div style="display:flex;gap:11px;align-items:center"><span style="font-size:13px;color:var(--text2);font-weight:700">Minuto:</span>'
    +'<input type="number" class="form-input" style="width:78px;padding:6px 10px" value="'+(ct.minute||'')+'" placeholder="0" min="0" data-action="set-minute" data-sid="'+s.id+'" data-tid="'+cs.id+'" data-eid="'+ct.id+'">'
    +'</div></div>';
}

function seasonAccHTML(s,t){
  const calcAvg=seasonAvg(t);           // calculated from episodes
  const manualRating=t.userRating||'';  // manual override
  const displayAvg=manualRating||calcAvg; // what to show
  const watched=(t.episodes||[]).filter(e=>e.watched).length;
  const total=(t.episodes||[]).length;
  const allWatched=total>0&&watched===total;
  return '<div class="season-acc" id="sacc-'+t.id+'">'
    +'<div class="season-head" data-action="toggle-season" data-tid="'+t.id+'">'
    +'<div class="season-hl">'

function saveItem(){
  const title=(id('f-title')?.value||'').trim();
  if(!title){ alert('El título es obligatorio.'); return; }
  const type=S.editType;
  const isEdit=!!S.editId;
  const itemId=isEdit?S.editId:uid();
  const arr=type==='series'?S.series:S.movies;
  const existing=isEdit?arr.find(i=>i.id===itemId):null;
  const genres=(id('f-genres')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);
  const universes=(id('f-universes')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);
  const item={
    ...(existing||{}), id:itemId, type, title,
    startYear:parseInt(id('f-start')?.value)||null,
    endYear:parseInt(id('f-end')?.value)||null,
    platform:id('f-platform')?.value||'',
    status:id('f-status')?.value||'pending',
    genres, universes,
    imdbRating:parseFloat(id('f-imdb-rating')?.value)||null,
    imdbUrl:id('f-imdb-url')?.value||'',
    posterUrl:id('f-poster')?.value||'',
    emoji:id('f-emoji')?.value||'',
    synopsis:id('f-synopsis')?.value||'',
    updatedAt:Date.now()
  };
  if(type==='movies'){
    item.director=id('f-director')?.value||'';
  }
  // Awards for both series and movies
  item.awards=(id('f-awards')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);
  if(!existing){
    item.seasons=(_pendingSeasons.length>0&&type==='series')?_pendingSeasons:[];
    item.comments=[]; item.quotes=[]; item.createdAt=Date.now();
  } else if(type==='series'&&_pendingSeasons.length>0){
    item.seasons=_pendingSeasons;
  }
  _pendingSeasons=[];
  if(isEdit){ const idx=arr.findIndex(i=>i.id===itemId); arr[idx]=item; }
  else arr.push(item);
  save(); closeModal(); renderView();
  if(isEdit) openDetail(itemId,type);
}

function saveSeason(seriesId){
  const s=S.series.find(x=>x.id===seriesId);
  if(!s.seasons) s.seasons=[];
  s.seasons.push({id:uid(),number:parseInt(id('s-num')?.value)||s.seasons.length+1,title:id('s-title')?.value||'',desc:id('s-desc')?.value||'',episodes:[]});
  save(); closeModal(); openDetail(seriesId,'series');
}

function saveEpisode(seriesId,seasonId){
  const s=S.series.find(x=>x.id===seriesId);
  const t=s.seasons.find(x=>x.id===seasonId);
  if(!t.episodes) t.episodes=[];
  t.episodes.push({id:uid(),number:parseInt(id('e-num')?.value)||t.episodes.length+1,title:id('e-title')?.value||'',desc:id('e-desc')?.value||'',watched:false,current:false,rating:0,minute:0});
  save(); closeModal(); openDetail(seriesId,'series');
}

const TMDB_KEY='2dca580c2a14b55200e784d157207b4d';
const TMDB_BASE='https://api.themoviedb.org/3';
const TMDB_IMG='https://image.tmdb.org/t/p/w185';

function attachTmdbListeners(mediaType){
  // Use setTimeout to ensure DOM is ready
  setTimeout(()=>{
    const btn=id('tmdb-btn'), inp=id('tmdb-q');
    if(btn) btn.addEventListener('click',()=>tmdbSearch(mediaType));
    if(inp) inp.addEventListener('keydown',e=>{ if(e.key==='Enter') tmdbSearch(mediaType); });
  },50);
}

async function tmdbSearch(mediaType){
  const q=(id('tmdb-q')?.value||'').trim();
  if(!q) return;
  const el=id('tmdb-results'); if(!el) return;
  el.innerHTML='<div class="tmdb-status">🔍 Buscando...</div>';
  try{
    const r=await fetch(TMDB_BASE+'/search/'+mediaType+'?api_key='+TMDB_KEY+'&query='+encodeURIComponent(q)+'&language=es-ES');
    const d=await r.json();
    if(!d.results||!d.results.length){ el.innerHTML='<div class="tmdb-status">Sin resultados.</div>'; return; }
    el.innerHTML='<div class="tmdb-results">'+d.results.slice(0,7).map(r=>{
      const title=mediaType==='tv'?r.name:r.title;
      const year=(mediaType==='tv'?r.first_air_date:r.release_date||'').slice(0,4);
      const thumb=r.poster_path?TMDB_IMG+r.poster_path:'';
      const score=r.vote_average?('⭐ '+r.vote_average.toFixed(1)):'';
      return '<div class="tmdb-item" data-tmdb-id="'+r.id+'" data-media="'+mediaType+'">'
        +(thumb?'<img class="tmdb-thumb" src="'+thumb+'" onerror="this.style.display=\'none\'">':'<div class="tmdb-thumb" style="display:flex;align-items:center;justify-content:center;font-size:16px">🎬</div>')
        +'<div class="tmdb-info"><div class="tmdb-name">'+esc(title||'')+'</div><div class="tmdb-year">'+esc(year)+' · '+(mediaType==='tv'?'Serie':'Película')+'</div></div>'
        +'<div class="tmdb-score">'+score+'</div></div>';
    }).join('')+'</div>';
    // Attach click listeners to results
    el.querySelectorAll('.tmdb-item').forEach(item=>{
      item.addEventListener('click',()=>tmdbFill(parseInt(item.dataset.tmdbId), item.dataset.media));
    });
  }catch(e){ el.innerHTML='<div class="tmdb-status">⚠️ Error de conexión.</div>'; }
}

async function tmdbFill(tmdbId, mediaType){
  const el=id('tmdb-results'); if(!el) return;
  el.innerHTML='<div class="tmdb-status">⏳ Cargando datos...</div>';
  try{
    const r=await fetch(TMDB_BASE+'/'+mediaType+'/'+tmdbId+'?api_key='+TMDB_KEY+'&language=es-ES&append_to_response=external_ids,credits');
    const d=await r.json();
    const set=(fieldId,val)=>{ const el=id(fieldId); if(el&&val) el.value=val; };
    const title=mediaType==='tv'?d.name:d.title;
    const year=(mediaType==='tv'?d.first_air_date:d.release_date||'').slice(0,4);
    const endYear=mediaType==='tv'&&d.last_air_date?d.last_air_date.slice(0,4):'';
    const genres=(d.genres||[]).map(g=>g.name).join(', ');
    const imdbId=d.external_ids?.imdb_id||'';
    set('f-title',title); set('f-start',year);
    if(endYear&&endYear!==year) set('f-end',endYear);
    if(d.poster_path) set('f-poster','https://image.tmdb.org/t/p/w500'+d.poster_path);
    if(d.overview) set('f-synopsis',d.overview);
    if(genres) set('f-genres',genres);
    if(d.vote_average) set('f-imdb-rating',d.vote_average.toFixed(1));
    if(imdbId) set('f-imdb-url','https://www.imdb.com/title/'+imdbId+'/');
    if(mediaType==='movie'){
      const dir=(d.credits?.crew||[]).filter(c=>c.job==='Director').map(c=>c.name).join(', ');
      if(dir) set('f-director',dir);
    }

    // Fetch awards from OMDb using imdbId
    if(imdbId){
      el.innerHTML='<div class="tmdb-status">🏆 Buscando premios...</div>';
      try{
        const omdbRes=await fetch('https://www.omdbapi.com/?i='+imdbId+'&apikey=trilogy');
        const omdb=await omdbRes.json();
        if(omdb.Response==='True' && omdb.Awards && omdb.Awards!=='N/A'){
          // Parse OMDb awards string into array of meaningful entries
          const awardsRaw=omdb.Awards;
          // Build a readable list from the OMDb awards string
          const awardsList=parseAwards(awardsRaw);
          const awardsEl=id('f-awards');
          if(awardsEl && awardsList.length) awardsEl.value=awardsList.join(', ');
        }
      }catch(e){ /* awards fetch failed silently */ }
    }

    if(mediaType==='movie'){
      _pendingSeasons=[];
      el.innerHTML='<div class="tmdb-ok">✅ <strong>'+esc(title)+'</strong> cargada con premios</div>';
      return;
    }

    // TV: fetch seasons
    const total=d.number_of_seasons||0;
    if(!total){ _pendingSeasons=[]; el.innerHTML='<div class="tmdb-ok">✅ '+esc(title)+' cargada</div>'; return; }
    el.innerHTML='<div class="tmdb-status">🎬 Cargando '+total+' temporada(s)...</div>';
    const seasonData=await Promise.all(Array.from({length:total},(_,i)=>
      fetch(TMDB_BASE+'/tv/'+tmdbId+'/season/'+(i+1)+'?api_key='+TMDB_KEY+'&language=es-ES').then(r=>r.json()).catch(()=>null)
    ));
    _pendingSeasons=[];
    seasonData.forEach((sd,si)=>{
      if(!sd||sd.status_code) return;
      _pendingSeasons.push({
        id:'sid_auto_'+(si+1)+'_'+Date.now(),
        number:sd.season_number||(si+1), title:'', desc:sd.overview||'',
        episodes:(sd.episodes||[]).map((ep,ei)=>({
          id:'eid_auto_'+(si+1)+'_'+(ei+1)+'_'+Date.now(),
          number:ep.episode_number||(ei+1),
          title:ep.name||('Episodio '+(ei+1)),
          desc:ep.overview||'',
          watched:false,current:false,rating:0,minute:0
        }))
      });
    });
    const epCount=_pendingSeasons.reduce((a,s)=>a+s.episodes.length,0);
    el.innerHTML='<div class="tmdb-ok">✅ <strong>'+esc(title)+'</strong> — '+_pendingSeasons.length+' temporadas · '+epCount+' episodios · Pulsa Guardar</div>';
  }catch(e){ el.innerHTML='<div class="tmdb-status">⚠️ Error al cargar.</div>'; }
}

// Parse OMDb awards string into clean array
// e.g. "Won 4 Oscars. Another 21 wins & 43 nominations." → ["4 Oscars", "21 premios", "43 nominaciones"]
function parseAwards(str){
  if(!str||str==='N/A') return [];
  const results=[];
  // Oscar wins
  const oscarWin=str.match(/Won\s+(\d+)\s+Oscar/i);
  if(oscarWin) results.push('🏆 '+oscarWin[1]+' Oscar'+(oscarWin[1]>1?'s':''));
  // Oscar nominations
  const oscarNom=str.match(/Nominated for\s+(\d+)\s+Oscar/i);
  if(oscarNom) results.push('☆ '+oscarNom[1]+' nominación'+(oscarNom[1]>1?'es':'')+' al Oscar');
  // Other wins
  const wins=str.match(/(\d+)\s+win/i);
  if(wins && parseInt(wins[1])>0) results.push(wins[1]+' premios');
  // Other nominations
  const noms=str.match(/(\d+)\s+nomination/i);
  if(noms && parseInt(noms[1])>0) results.push(parseInt(noms[1])+' nominaciones');
  // Emmy wins
  const emmy=str.match(/(\d+)\s+(?:Primetime\s+)?Emmy/i);
  if(emmy) results.push(emmy[1]+' Emmy'+(emmy[1]>1?'s':''));
  // Golden Globe
  const gg=str.match(/(\d+)\s+Golden Globe/i);
  if(gg) results.push(gg[1]+' Globo'+(gg[1]>1?'s':'')+' de Oro');
  // If nothing parsed, just return the raw string trimmed
  if(!results.length && str.length<120) return [str];
  return results;
}

//  EVENT DELEGATION — single listener handles all clicks
// ═══════════════════════════════════════════
document.addEventListener('click', function(e){
  // Nav items
  const navItem=e.target.closest('.nav-item');
  if(navItem && navItem.id) { navigate(navItem.id.replace('nav-','')); return; }

  // Sidebar overlay
  if(e.target.id==='sidebar-overlay'){ closeSidebar(); return; }
  if(e.target.id==='hamburger'){ toggleSidebar(); return; }

  // Panel overlay
  if(e.target.id==='panel-overlay'){ closePanel(); return; }

  // Modal X
  if(e.target.id==='modal-x'){ closeModal(); return; }

  // Add button
  if(e.target.id==='btn-add'){ openAddModal(); return; }

  // Cards — check first before data-action to avoid missing clicks
  const card=e.target.closest('.media-card,.now-card,.pend-item');
  if(card && card.dataset.id && !e.target.closest('[data-action]')){
    openDetail(card.dataset.id, card.dataset.type); return;
  }

  // data-action
  const el=e.target.closest('[data-action]');
  if(!el) return;
  const action=el.dataset.action;

  if(action==='nav'){ navigate(el.dataset.nav); return; }

  if(action==='edit'){ openEditModal(el.dataset.id, el.dataset.type); return; }
  if(action==='delete'){
    if(!confirm('¿Eliminar?')) return;
    if(el.dataset.type==='series') S.series=S.series.filter(s=>s.id!==el.dataset.id);
    else S.movies=S.movies.filter(m=>m.id!==el.dataset.id);
    save(); closePanel(); renderView(); return;
  }
  if(action==='add-season'){ openSeasonModal(el.dataset.id); return; }
  if(action==='add-ep'){ openEpisodeModal(el.dataset.sid, el.dataset.tid); return; }
  if(action==='del-season'){
    if(!confirm('¿Eliminar temporada?')) return;
    const s=S.series.find(x=>x.id===el.dataset.sid);
    s.seasons=s.seasons.filter(t=>t.id!==el.dataset.tid);
    save(); openDetail(el.dataset.sid,'series'); return;
  }
  if(action==='del-ep'){
    const s=S.series.find(x=>x.id===el.dataset.sid);
    const t=s.seasons.find(x=>x.id===el.dataset.tid);
    t.episodes=t.episodes.filter(ep=>ep.id!==el.dataset.eid);
    save(); openDetail(el.dataset.sid,'series'); return;
  }
  if(action==='toggle-ep'){
    const s=S.series.find(x=>x.id===el.dataset.sid);
    const t=s.seasons.find(x=>x.id===el.dataset.tid);
    const ep=t.episodes.find(x=>x.id===el.dataset.eid);
    ep.watched=!ep.watched; if(ep.watched) ep.current=false;
    save();
    // Update just this checkbox in-place, no panel reload
    const cls=ep.watched?'done':(ep.current?'cur':'');
    el.className='ep-check '+cls;
    el.textContent=ep.watched?'✓':(ep.current?'▶':'');
    // Update season stats text
    const acc=document.getElementById('sacc-'+t.id);
    if(acc){
      const watchedNow=t.episodes.filter(e=>e.watched).length;
      const statsEl=acc.querySelector('.s-stats');
      if(statsEl) statsEl.textContent=watchedNow+'/'+t.episodes.length+' vistos';
    }
    return;
  }
  if(action==='watch-season'){
    const s=S.series.find(x=>x.id===el.dataset.sid);
    const t=s.seasons.find(x=>x.id===el.dataset.tid);
    const allWatched=t.episodes.length>0&&t.episodes.every(e=>e.watched);
    t.episodes.forEach(e=>{ e.watched=!allWatched; if(!allWatched) e.current=false; });
    save();
    // Update all checkboxes in this season in-place
    const acc=document.getElementById('sacc-'+t.id);
    if(acc){
      acc.querySelectorAll('.ep-check').forEach(chk=>{
        const eid=chk.dataset.eid;
        const ep=t.episodes.find(e=>e.id===eid);
        if(ep){ chk.className='ep-check'+(ep.watched?' done':''); chk.textContent=ep.watched?'✓':''; }
      });
      const statsEl=acc.querySelector('.s-stats');
      if(statsEl) statsEl.textContent=t.episodes.filter(e=>e.watched).length+'/'+t.episodes.length+' vistos';
      const btn=el; btn.textContent=allWatched?'✓ Todo visto':'↩ Vista'; btn.title=allWatched?'Marcar temporada completa':'Desmarcar temporada';
    }
    return;
  }
  if(action==='set-cur-ep'){
    const s=S.series.find(x=>x.id===el.dataset.sid);
    const targetTid=el.dataset.tid, targetEid=el.dataset.eid;
    // Clear all current flags
    s.seasons.forEach(t=>t.episodes.forEach(ep=>ep.current=false));
    // Mark all episodes before this one (across seasons) as watched
    let found=false;
    s.seasons.forEach(t=>{
      t.episodes.forEach(ep=>{
        if(ep.id===targetEid){ ep.current=true; found=true; }
        else if(!found){ ep.watched=true; }
      });
    });
    save();
    // Refresh the whole seasons tab since many rows may have changed
    openDetail(el.dataset.sid,'series');
    // Re-open the season accordion that was open
    setTimeout(()=>{
      const acc=document.getElementById('sacc-'+targetTid);
      if(acc) acc.classList.add('open');
    },50);
    return;
  }
  if(action==='rate-season'){
    // handled via change event
    return;
  }
  if(action==='rate-item-btn'){
    const inputEl=document.getElementById(el.dataset.input);
    if(!inputEl) return;
    saveItemRating(el.dataset.id, el.dataset.type, inputEl.value.trim());
    return;
  }
  if(action==='add-comment'){
    const ta=id('new-comment'); if(!ta||!ta.value.trim()) return;
    const arr=el.dataset.type==='series'?S.series:S.movies;
    const item=arr.find(i=>i.id===el.dataset.sid);
    if(!item.comments) item.comments=[];
    item.comments.push({text:ta.value.trim(),date:Date.now()});
    save(); openDetail(el.dataset.sid,el.dataset.type); return;
  }
  if(action==='del-comment'){
    const arr=el.dataset.type==='series'?S.series:S.movies;
    const item=arr.find(i=>i.id===el.dataset.sid);
    item.comments.splice(parseInt(el.dataset.idx),1);
    save(); openDetail(el.dataset.sid,el.dataset.type); return;
  }
  if(action==='add-quote'){
    const ta=id('new-quote'); if(!ta||!ta.value.trim()) return;
    const m=S.movies.find(i=>i.id===el.dataset.mid);
    if(!m.quotes) m.quotes=[];
    m.quotes.push(ta.value.trim()); save(); openDetail(el.dataset.mid,'movies'); return;
  }
  if(action==='del-quote'){
    const m=S.movies.find(i=>i.id===el.dataset.mid);
    m.quotes.splice(parseInt(el.dataset.idx),1); save(); openDetail(el.dataset.mid,'movies'); return;
  }
  if(action==='toggle-season'){
    const acc=id('sacc-'+el.dataset.tid); if(acc) acc.classList.toggle('open'); return;
  }
});

// Tab switching
document.addEventListener('click',function(e){
  const tab=e.target.closest('.tab');
  if(!tab) return;
  const container=tab.closest('.det-body');
  if(!container) return;
  container.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  container.querySelectorAll('.tab-pane').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  const pane=container.querySelector('#'+tab.dataset.tab);
  if(pane) pane.classList.add('active');
});

// Rating and minute inputs via change event
document.addEventListener('change',function(e){
  const el=e.target.closest('[data-action]');
  if(!el) return;
  const action=el.dataset.action;

  if(action==='set-minute'){
    const s=S.series.find(x=>x.id===el.dataset.sid);
    const t=s.seasons.find(x=>x.id===el.dataset.tid);
    const ep=t.episodes.find(x=>x.id===el.dataset.eid);
    ep.minute=parseInt(el.value)||0; save(); return;
  }
  if(action==='rate-season'){
    const val=Math.min(10,Math.max(1,parseInt(el.value)||0));
    el.value=val||'';
    const s=S.series.find(x=>x.id===el.dataset.sid);
    const t=s.seasons.find(x=>x.id===el.dataset.tid);
    t.userRating=val||null; save();
    // Update this season's displayed score
    const avgEl=document.getElementById('savg-'+t.id);
    if(avgEl){ avgEl.textContent=(t.userRating||seasonAvg(t))||''; }
    // Update series overall rating in header
    const seriesAvgEl=document.getElementById('series-avg-display');
    if(seriesAvgEl){ const na=avgRating(s); seriesAvgEl.textContent=na?('★ '+na):'Sin puntuar'; }
    return;
  }
  if(action==='rate-ep'){
    const val=Math.min(10,Math.max(0,parseInt(el.value)||0));
    el.value=val||'';
    const s=S.series.find(x=>x.id===el.dataset.sid);
    const t=s.seasons.find(x=>x.id===el.dataset.tid);
    const ep=t.episodes.find(x=>x.id===el.dataset.eid);
    ep.rating=val; save();
    // Update season avg display in season header
    const acc=document.getElementById('sacc-'+t.id);
    if(acc){
      const newAvg=seasonAvg(t);
      const avgEl=acc.querySelector('.s-avg');
      if(avgEl) avgEl.textContent=newAvg||'';
    }
    // Update series overall rating in header
    const seriesAvgEl=document.getElementById('series-avg-display');
    if(seriesAvgEl){ const na=avgRating(s); seriesAvgEl.textContent=na?('★ '+na):'Sin puntuar'; }
    return;
  }
  if(action==='rate-item'){
    saveItemRating(el.dataset.id, el.dataset.type, el.value.trim());
    return;
  }
});

// Shared function to save item rating
function saveItemRating(itemId, type, rawVal){
  const val=rawVal===''?null:Math.min(10,Math.max(1,parseInt(rawVal)||1));
  const arr=type==='series'?S.series:S.movies;
  const item=arr.find(i=>i.id===itemId);
  if(!item) return;
  item.userRating=val;
  item.updatedAt=Date.now();
  save();
  // Update display span
  const displayEl=document.getElementById('rate-display-'+itemId);
  if(displayEl) displayEl.textContent=val?(val+' pts'):'';
  // Update header
  const seriesAvgEl=document.getElementById('series-avg-display');
  if(seriesAvgEl && type==='series'){
    const na=avgRating(item);
    seriesAvgEl.textContent=na?('★ '+na):'Sin puntuar';
  }
}
